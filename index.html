<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explainer OS v2026 - God Tier Pipeline</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-mono-code {
            font-family: 'Fira Code', monospace;
        }
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #404040;
        }
        /* Glow animations */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
            50% { box-shadow: 0 0 25px rgba(59, 130, 246, 0.4); }
        }
        .glow-active {
            animation: pulse-glow 3s infinite;
        }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100 selection:bg-blue-600 selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- PRESETS & HARDCODED BLUEPRINTS ---
        const DEFAULT_TOPICS = [
            { id: 1, title: "Why Complete Silence Terrifies The Human Brain", cat: "Psychology", curiosity: 9.8, novelty: 9.5, relatability: 9.2, hook: "Absolute silence can cause visual hallucinations in less than 45 minutes because the brain starves for input." },
            { id: 2, title: "The Dark Reason Why Wild Animals Fear Us", cat: "Evolution", curiosity: 9.9, novelty: 9.7, relatability: 9.4, hook: "Humans are the only predators that hunt by persistence—tracking prey until it drops dead of heat exhaustion." },
            { id: 3, title: "How A Single Coding Error Wiped Out $500M", cat: "History", curiosity: 9.6, novelty: 9.1, relatability: 9.0, hook: "A junior dev forgot one line of validation code and triggered an automated loop that drained the system in 45 seconds." },
            { id: 4, title: "Why You Can't Remember Being A Baby", cat: "Memory", curiosity: 9.4, novelty: 9.0, relatability: 9.8, hook: "Your infant brain grows new neurons so fast it literally overrides and overwrites its own memory storage cables." }
        ];

        const BANNED_PRONOUNS = ['he', 'she', 'it', 'they', 'his', 'her', 'their', 'its', 'same', 'similar', 'previous', 'earlier', 'above', 'below', 'again', 'identical', 'figure', 'character'];

        // --- UTILITY COMPONENT: DYNAMIC DOODLE PREVIEW RENDERER ---
        // Generates an interactive, humorous SVG preview based on keywords in the prompt.
        function DoodlePreview({ prompt = "" }) {
            const upPrompt = prompt.toUpperCase();
            
            // Check flags
            const hasBob = upPrompt.includes("BOB") || upPrompt.includes("RED BASEBALL CAP") || upPrompt.includes("BLUE HOODIE");
            const hasSara = upPrompt.includes("SARA") || upPrompt.includes("PINK SHIRT") || upPrompt.includes("BLUE SKIRT");
            const isShocked = upPrompt.includes("SHOCK") || upPrompt.includes("TERROR") || upPrompt.includes("BELIEVE") || upPrompt.includes("FEAR") || upPrompt.includes("SCREAM");
            const hasEar = upPrompt.includes("EAR") || upPrompt.includes("HEAR") || upPrompt.includes("SOUND") || upPrompt.includes("SILENCE");
            const hasButton = upPrompt.includes("BUTTON");
            const hasCoffee = upPrompt.includes("COFFEE") || upPrompt.includes("SPLASH") || upPrompt.includes("CUP");
            const hasMoney = upPrompt.includes("MONEY") || upPrompt.includes("BILLION") || upPrompt.includes("DOLLAR");
            const isDark = upPrompt.includes("DARK") || upPrompt.includes("VOID") || upPrompt.includes("BLACK BACKGROUND");

            return (
                <div className={`w-full h-full min-h-[140px] rounded-xl flex items-center justify-center border transition-all ${isDark ? 'bg-neutral-900 border-neutral-800' : 'bg-white border-neutral-200'}`}>
                    <svg viewBox="0 0 200 150" className="w-full h-full max-h-[160px]">
                        {/* Background objects */}
                        {hasEar && (
                            <path d="M 150 40 C 120 20, 110 80, 140 100 C 150 110, 170 100, 160 80" fill="none" stroke="#ef4444" strokeWidth="3" strokeLinecap="round" strokeDasharray="3 3"/>
                        )}
                        {hasButton && (
                            <g>
                                <ellipse cx="150" cy="110" rx="20" ry="10" fill="#ef4444" stroke="#000" strokeWidth="2.5" />
                                <rect x="145" y="110" width="10" height="15" fill="#991b1b" stroke="#000" strokeWidth="2.5" />
                            </g>
                        )}
                        {hasMoney && (
                            <g fill="none" stroke="#22c55e" strokeWidth="2">
                                <rect x="130" y="30" width="30" height="15" rx="2" transform="rotate(15 145 37)" />
                                <text x="140" y="42" fill="#22c55e" fontSize="10" fontWeight="bold" transform="rotate(15 145 37)">$</text>
                            </g>
                        )}
                        
                        {/* Character 1: Bob (Left/Center) */}
                        {hasBob && (
                            <g transform="translate(10, 0)">
                                {/* Stickman body lines */}
                                <line x1="70" y1="75" x2="70" y2="115" stroke="#000" strokeWidth="3.5" strokeLinecap="round" /> {/* spine */}
                                <line x1="70" y1="115" x2="55" y2="140" stroke="#000" strokeWidth="3.5" strokeLinecap="round" /> {/* left leg */}
                                <line x1="70" y1="115" x2="85" y2="140" stroke="#000" strokeWidth="3.5" strokeLinecap="round" /> {/* right leg */}
                                
                                {/* Blue Hoodie Fill */}
                                <path d="M 60 77 L 80 77 L 85 110 L 55 110 Z" fill="#3b82f6" opacity="0.8" />
                                
                                {/* Arms */}
                                {isShocked ? (
                                    <g stroke="#000" strokeWidth="3.5" strokeLinecap="round">
                                        <line x1="70" y1="85" x2="45" y2="60" /> {/* raised left arm */}
                                        <line x1="70" y1="85" x2="95" y2="60" /> {/* raised right arm */}
                                    </g>
                                ) : (
                                    <g stroke="#000" strokeWidth="3.5" strokeLinecap="round">
                                        <line x1="70" y1="85" x2="50" y2="100" />
                                        <line x1="70" y1="85" x2="90" y2="100" />
                                    </g>
                                )}

                                {/* Head */}
                                <circle cx="70" cy="50" r="16" fill="#fff" stroke="#000" strokeWidth="3.5" />
                                
                                {/* Red Cap */}
                                <path d="M 54 48 C 54 36, 86 36, 86 48 Z" fill="#ef4444" stroke="#000" strokeWidth="2" />
                                <path d="M 78 46 L 98 42 L 95 49 Z" fill="#ef4444" stroke="#000" strokeWidth="2" /> {/* brim */}

                                {/* Expression */}
                                {isShocked ? (
                                    <g fill="#000">
                                        <circle cx="64" cy="48" r="2.5" />
                                        <circle cx="76" cy="48" r="2.5" />
                                        <ellipse cx="70" cy="58" rx="5" ry="4" fill="none" stroke="#000" strokeWidth="2" /> {/* open mouth */}
                                        {/* Sweat drops */}
                                        <path d="M 45 42 Q 40 45 42 48" stroke="#3b82f6" strokeWidth="2" fill="none" />
                                        <path d="M 95 42 Q 100 45 98 48" stroke="#3b82f6" strokeWidth="2" fill="none" />
                                    </g>
                                ) : (
                                    <g fill="#000">
                                        <circle cx="64" cy="48" r="2.5" />
                                        <circle cx="76" cy="48" r="2.5" />
                                        <path d="M 64 56 Q 70 64 76 56" fill="none" stroke="#000" strokeWidth="2" strokeLinecap="round" /> {/* smile */}
                                    </g>
                                )}

                                {/* Coffee Splash */}
                                {hasCoffee && (
                                    <g>
                                        <rect x="92" y="95" width="10" height="12" rx="1" fill="#fff" stroke="#000" strokeWidth="2" transform="rotate(35 97 101)" />
                                        <path d="M 98 90 Q 105 75 112 85 Q 102 70 96 90" fill="#78350f" opacity="0.9" />
                                    </g>
                                )}
                            </g>
                        )}

                        {/* Character 2: Sara (Right/Center) */}
                        {hasSara && (
                            <g transform={hasBob ? "translate(60, 10)" : "translate(10, 10)"}>
                                {/* Squiggly Hair */}
                                <path d="M 50 35 Q 35 25 35 60 Q 40 30 65 30 Q 80 25 85 60 Q 75 30 50 35" fill="none" stroke="#000" strokeWidth="3" />
                                
                                {/* Body lines */}
                                <line x1="60" y1="75" x2="60" y2="110" stroke="#000" strokeWidth="3.5" strokeLinecap="round" /> {/* spine */}
                                <line x1="60" y1="110" x2="48" y2="135" stroke="#000" strokeWidth="3.5" strokeLinecap="round" />
                                <line x1="60" y1="110" x2="72" y2="135" stroke="#000" strokeWidth="3.5" strokeLinecap="round" />
                                
                                {/* Pink Shirt / Skirt */}
                                <path d="M 52 77 L 68 77 L 72 100 L 48 100 Z" fill="#ec4899" opacity="0.8" />
                                <path d="M 48 100 L 72 100 L 75 110 L 45 110 Z" fill="#3b82f6" opacity="0.8" />

                                {/* Arms */}
                                <line x1="60" y1="82" x2="42" y2="95" stroke="#000" strokeWidth="3.5" strokeLinecap="round"/>
                                <line x1="60" y1="82" x2="78" y2="95" stroke="#000" strokeWidth="3.5" strokeLinecap="round"/>

                                {/* Head */}
                                <circle cx="60" cy="50" r="15" fill="#fff" stroke="#000" strokeWidth="3.5" />
                                
                                {/* Glasses */}
                                <circle cx="53" cy="48" r="5" fill="none" stroke="#000" strokeWidth="1.8" />
                                <circle cx="67" cy="48" r="5" fill="none" stroke="#000" strokeWidth="1.8" />
                                <line x1="58" y1="48" x2="62" y2="48" stroke="#000" strokeWidth="2" />

                                {/* Expression */}
                                {isShocked ? (
                                    <ellipse cx="60" cy="58" rx="4" ry="5" fill="none" stroke="#000" strokeWidth="2" />
                                ) : (
                                    <path d="M 56 56 Q 60 62 64 56" fill="none" stroke="#000" strokeWidth="2" />
                                )}
                            </g>
                        )}

                        {/* Generic Doodle if no matches */}
                        {!hasBob && !hasSara && (
                            <g>
                                <circle cx="100" cy="55" r="18" fill="#fff" stroke="#000" strokeWidth="3.5" />
                                <line x1="100" y1="73" x2="100" y2="115" stroke="#000" strokeWidth="3.5" />
                                <line x1="100" y1="85" x2="75" y2="95" stroke="#000" strokeWidth="3.5" strokeLinecap="round" />
                                <line x1="100" y1="85" x2="125" y2="95" stroke="#000" strokeWidth="3.5" strokeLinecap="round" />
                                <line x1="100" y1="115" x2="85" y2="142" stroke="#000" strokeWidth="3.5" />
                                <line x1="100" y1="115" x2="115" y2="142" stroke="#000" strokeWidth="3.5" />
                                <circle cx="94" cy="52" r="2.5" fill="#000" />
                                <circle cx="106" cy="52" r="2.5" fill="#000" />
                                <path d="M 94 62 Q 100 68 106 62" fill="none" stroke="#000" strokeWidth="2" />
                                
                                {/* Question Marks / Sparkles */}
                                <text x="125" y="45" fill="#ef4444" fontSize="18" fontWeight="bold">?</text>
                                <text x="65" y="45" fill="#ef4444" fontSize="18" fontWeight="bold">?</text>
                            </g>
                        )}
                    </svg>
                </div>
            );
        }

        // --- MAIN APP COMPONENT ---
        function App() {
            const [authenticated, setAuthenticated] = useState(false);
            const [passKey, setPassKey] = useState('');
            const [activeTab, setActiveTab] = useState('terminal');
            
            // App state buffers
            const [apiKey, setApiKey] = useState('');
            const [model, setModel] = useState('deepseek/deepseek-chat');
            const [outputPath, setOutputPath] = useState('');
            const [characters, setCharacters] = useState([]);
            
            const [topicBank, setTopicBank] = useState(DEFAULT_TOPICS);
            const [selectedTopic, setSelectedTopic] = useState(DEFAULT_TOPICS[0]);
            
            const [pipelineLogs, setPipelineLogs] = useState([]);
            const [currentScript, setCurrentScript] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [serverStatus, setServerStatus] = useState('Checking...');
            
            // Modal/Detail State
            const [activePreviewPrompt, setActivePreviewPrompt] = useState('');
            
            const logEndRef = useRef(null);

            // Fetch server configuration on load
            useEffect(() => {
                fetch('/api/config')
                    .then(res => res.json())
                    .then(data => {
                        setServerStatus('Online');
                        if (data.apiKey) setApiKey(data.apiKey);
                        if (data.model) setModel(data.model);
                        if (data.outputPath) setOutputPath(data.outputPath);
                        if (data.characters) setCharacters(data.characters);
                    })
                    .catch(err => {
                        console.log('Running client-only mode (server offline)');
                        setServerStatus('Offline (Client-Only)');
                        // Load defaults
                        setCharacters([
                            { name: 'BOB', description: 'Stick figure man, round head, thin body, red baseball cap forward, blue hoodie, black pants, white sneakers, large eyebrows, goofy smile' },
                            { name: 'SARA', description: 'Female stick figure, long hair drawn as squiggly lines, pink shirt, blue skirt, glasses, surprised expression' }
                        ]);
                    });
            }, []);

            // Scroll logs to bottom
            useEffect(() => {
                if (logEndRef.current) {
                    logEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [pipelineLogs]);

            // Save config back to local server
            const saveConfigToServer = async (updatedFields) => {
                if (serverStatus.includes('Offline')) {
                    // Just save locally in browser storage
                    return;
                }
                try {
                    await fetch('/api/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updatedFields)
                    });
                } catch (e) {
                    console.error('Failed to sync settings to server', e);
                }
            };

            const addLog = (msg) => {
                setPipelineLogs(prev => [...prev, `[${new Date().toLocaleTimeString()}] ${msg}`]);
            };

            // Stateles guardrail verification function
            const validatePromptText = (prompt) => {
                const clean = prompt.toLowerCase();
                const matchedWords = [];
                BANNED_PRONOUNS.forEach(word => {
                    const regex = new RegExp(`\\b${word}\\b`, 'i');
                    if (regex.test(clean)) {
                        matchedWords.push(word);
                    }
                });
                return {
                    isValid: matchedWords.length === 0,
                    words: matchedWords
                };
            };

            // Dynamic Niche Topic AI Generation
            const generateTopicsViaAI = async () => {
                if (!apiKey) {
                    alert('Please set your OpenRouter API Key in the Settings tab first!');
                    return;
                }
                addLog('Inquiring OpenRouter for viral niche topics...');
                setIsGenerating(true);
                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`,
                            'HTTP-Referer': window.location.origin,
                            'X-Title': 'Doodle Theory'
                        },
                        body: JSON.stringify({
                            model: model,
                            messages: [
                                {
                                    role: 'user',
                                    content: `Generate 5 fresh, high-click, curiosity-driven viral video topics for the YouTube channel 'Doodle Theory' (mystery, strange history, bizarre facts, psychology, evolution). 
For each topic, evaluate and assign scores (0-10) for Curiosity, Novelty, and Relatability.
Also write a brief 1-sentence hook statement for each.

Output strictly as a JSON array inside a code block, formatted like this:
[
  {"id": 101, "title": "Topic Title Here", "cat": "Category", "curiosity": 9.5, "novelty": 9.0, "relatability": 8.5, "hook": "Shocking hook sentence"}
]`
                                }
                            ]
                        })
                    });

                    const result = await response.json();
                    const text = result.choices[0].message.content;
                    const jsonMatch = text.match(/\[[\s\S]*\]/);
                    
                    if (jsonMatch) {
                        const parsed = JSON.parse(jsonMatch[0]);
                        setTopicBank(parsed);
                        setSelectedTopic(parsed[0]);
                        addLog(`Successfully parsed ${parsed.length} new AI viral topics.`);
                    } else {
                        throw new Error("Could not extract JSON format from completion.");
                    }
                } catch (e) {
                    addLog(`Error generating topics: ${e.message}`);
                    alert(`Failed to generate topics: ${e.message}`);
                } finally {
                    setIsGenerating(false);
                }
            };

            // Main Orchestrated Script & Visual Prompt Generation Run
            const runScriptGeneration = async (topic) => {
                if (!apiKey) {
                    addLog('❌ Generation Aborted: Missing OpenRouter API Key. Please insert key in Settings.');
                    setActiveTab('settings');
                    return;
                }

                setIsGenerating(true);
                setPipelineLogs([]);
                addLog(`⚙️ Booting Explainer OS Generation Core...`);
                addLog(`🎯 Target Topic Lock: "${topic.title}"`);
                addLog(`🧠 Selected LLM: ${model}`);

                try {
                    // Injecting visual blueprints & character cards
                    addLog(`🧬 Injecting Visual Style DNA & Character definitions...`);
                    const charsString = characters.map(c => `- **${c.name}**: ${c.description}`).join('\n');
                    
                    const prompt = `You are the visual director and scriptwriter for the channel "Doodle Theory".
Produce a highly engaging video script about: "${topic.title}"
Hook Statement: "${topic.hook}"

Character Presets to use:
${charsString}

### CHANNEL GUIDELINES:
- Tone: chaotic, humorous, mildly sarcastic, friendly, explaining bizarre occurrences.
- Art style for prompts: hand-drawn stick figure doodles, simple lines, funny exaggerated expressions, white background.
- Visual pacing rule: Fast-paced scenes of 1-3 seconds.
- Stateless Prompts Rule (THE GOLDEN RULE): Image generator has no memory. Never use character names alone (e.g., "Bob is shocked") and never use pronouns (he, she, it, they, his, her, same, previous). You must fully describe the character and environment in every single row.

Generate Act 1 (the first 1.5 - 2 minutes of the video, at least 30 scenes).
Return strictly valid JSON format. Do not write explanations outside the JSON block.

Expected JSON schema:
{
  "title": "...",
  "thumbnail": "...",
  "scenes": [
    {
      "time": "0:00",
      "duration": 3,
      "voiceover": "...",
      "camera": "...",
      "sfx": "...",
      "prompt": "...",
      "textOverlay": "..."
    }
  ]
}`;

                    addLog(`⚡ Launching request stream to OpenRouter API (this may take up to 30-45 seconds)...`);
                    
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`,
                            'HTTP-Referer': window.location.origin,
                            'X-Title': 'Doodle Theory OS'
                        },
                        body: JSON.stringify({
                            model: model,
                            messages: [
                                { role: 'user', content: prompt }
                            ]
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`OpenRouter HTTP ${response.status}`);
                    }

                    const result = await response.json();
                    const content = result.choices[0].message.content;
                    
                    addLog(`📥 Completion received. Running structural sanitation parsing...`);
                    const jsonMatch = content.match(/\{[\s\S]*\}/);
                    
                    if (!jsonMatch) {
                        throw new Error("Failed to parse JSON blocks from AI response.");
                    }

                    const scriptData = JSON.parse(jsonMatch[0]);
                    
                    // Run QC checks on prompts
                    addLog(`🛡️ Triggering Stateless Quality Control check sweeps...`);
                    let qcErrorsCount = 0;
                    
                    const checkedScenes = scriptData.scenes.map((scene, idx) => {
                        const check = validatePromptText(scene.prompt);
                        if (!check.isValid) {
                            qcErrorsCount++;
                            addLog(`⚠️ QC Alert: Row ${idx+1} (${scene.time}) contains memory references: [${check.words.join(', ')}]`);
                        }
                        return {
                            ...scene,
                            qcErrors: check.words
                        };
                    });

                    const finalScript = {
                        ...scriptData,
                        scenes: checkedScenes
                    };

                    setCurrentScript(finalScript);
                    
                    if (qcErrorsCount === 0) {
                        addLog(`✅ Pipeline Successful: 0 pronoun errors found. Production blueprint ready.`);
                    } else {
                        addLog(`⚠️ QC Scan Finished: Flagged ${qcErrorsCount} prompts for containing relative pronouns. Use 'Auto-Fix' in the Sandbox to clean.`);
                    }

                } catch (e) {
                    addLog(`❌ Pipeline Failed: ${e.message}`);
                } finally {
                    setIsGenerating(false);
                }
            };

            // Append Act 2 / Extend Script
            const extendScript = async () => {
                if (!currentScript) return;
                
                setIsGenerating(true);
                addLog(`🔄 Initiating Script Extension sequence (Act 2)...`);
                
                try {
                    const charsString = characters.map(c => `- **${c.name}**: ${c.description}`).join('\n');
                    const lastScene = currentScript.scenes[currentScript.scenes.length - 1];
                    
                    const prompt = `You are continuing the Doodle Theory script: "${currentScript.title}".
Here is the summary of the script so far:
- Total scenes: ${currentScript.scenes.length}
- Last Scene Time: ${lastScene.time}
- Last Scene Voiceover: "${lastScene.voiceover}"

Character Presets:
${charsString}

Write Act 2 (the next 1.5 - 2 minutes of the video, at least 30 additional scenes).
Start the 'time' index from ${lastScene.time}.
Return strictly valid JSON format matching the schema:
{
  "scenes": [
     {
       "time": "...",
       "duration": 3,
       "voiceover": "...",
       "camera": "...",
       "sfx": "...",
       "prompt": "...",
       "textOverlay": "..."
     }
  ]
}`;

                    addLog(`⚡ Dispatching extension request to OpenRouter...`);
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`,
                            'HTTP-Referer': window.location.origin,
                            'X-Title': 'Doodle Theory OS'
                        },
                        body: JSON.stringify({
                            model: model,
                            messages: [
                                { role: 'user', content: prompt }
                            ]
                        })
                    });

                    const result = await response.json();
                    const content = result.choices[0].message.content;
                    
                    const jsonMatch = content.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("JSON parse error during extension sweep.");
                    
                    const extensionData = JSON.parse(jsonMatch[0]);
                    
                    addLog(`🛡️ Scanning extended scenes for stateless compliance...`);
                    const checkedExtended = extensionData.scenes.map((scene, idx) => {
                        const check = validatePromptText(scene.prompt);
                        return {
                            ...scene,
                            qcErrors: check.words
                        };
                    });

                    setCurrentScript(prev => ({
                        ...prev,
                        scenes: [...prev.scenes, ...checkedExtended]
                    }));

                    addLog(`✅ Extension appended. Added ${checkedExtended.length} new scenes.`);
                } catch (e) {
                    addLog(`❌ Extension failed: ${e.message}`);
                } finally {
                    setIsGenerating(false);
                }
            };

            // Auto-Fix prompts locally by replacing pronouns using LLM call
            const autoFixFlaggedPrompts = async () => {
                if (!currentScript) return;
                const flaggedIndices = currentScript.scenes
                    .map((s, i) => s.qcErrors && s.qcErrors.length > 0 ? i : -1)
                    .filter(i => i !== -1);
                
                if (flaggedIndices.length === 0) {
                    alert('No pronoun/reference issues detected!');
                    return;
                }

                setIsGenerating(true);
                addLog(`🔧 Launching Automated Pronoun Correction Routine for ${flaggedIndices.length} items...`);

                try {
                    const charsString = characters.map(c => `- **${c.name}**: ${c.description}`).join('\n');
                    
                    for (const index of flaggedIndices) {
                        const scene = currentScript.scenes[index];

Rules:
1. Replace character names (Bob, Sara, etc.) with their full visual descriptions.
2. Remove all relative reference words (he, she, it, they, his, her, their, same, previous, earlier, above, below, again).
3. Keep the art style: crude MS Paint stickman doodle, black outline, white background.

Character Presets:
${charsString}

Input Prompt to fix: "${scene.prompt}"
Return only the corrected prompt text, nothing else.`;

                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${apiKey}`
                            },
                            body: JSON.stringify({
                                model: model,
                                messages: [{ role: 'user', content: prompt }]
                            })
                        });

                        const result = await response.json();
                        const correctedText = result.choices[0].message.content.trim();
                        
                        // Update scene state
                        setCurrentScript(prev => {
                            const newScenes = [...prev.scenes];
                            newScenes[index] = {
                                ...newScenes[index],
                                prompt: correctedText,
                                qcErrors: []
                            };
                            return { ...prev, scenes: newScenes };
                        });
                        addLog(`✅ Refactored Scene ${index + 1} successfully.`);
                    }
                    addLog(`🎉 Stateless validation complete. All prompts sanitized.`);

                let contentString = '';

                if (format === 'json') {
                    contentString = JSON.stringify(currentScript, null, 2);
                } else {
                    // CSV format
                    const headers = ['Time', 'Duration', 'Voiceover', 'Camera/Editing', 'SFX', 'Image Prompt', 'Text Overlay'];
                    const rows = currentScript.scenes.map(s => [
                        s.time,
                        s.duration,
                        `"${s.voiceover.replace(/"/g, '""')}"`,
                        `"${s.camera.replace(/"/g, '""')}"`,
                        `"${s.sfx.replace(/"/g, '""')}"`,
                        `"${s.prompt.replace(/"/g, '""')}"`,
                        `"${(s.textOverlay || '').replace(/"/g, '""')}"`
                    ]);
                    contentString = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');

                if (serverStatus !== 'Offline (Client-Only)') {
                    try {
                        const response = await fetch('/api/save', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ filename, content: contentString })
                        });
                        const data = await response.ok ? await response.json() : null;
                        if (data && data.success) {

                            alert(`File successfully saved to: ${data.filePath}`);
                            return;

                    }

                const blob = new Blob([contentString], { type: format === 'json' ? 'application/json' : 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;

                                                                        <input 
                                                                            type="text" 
                                                                            className="bg-transparent focus:bg-neutral-950 border border-transparent focus:border-neutral-800 p-1 w-full rounded outline-none"
                                                                            value={scene.camera}
                                                                            onChange={(e) => handleCellEdit(i, 'camera', e.target.value)}
                                                                        />
                                                                    </td>
                                                                    <td className="py-3.5 px-4">
                                                                        <div className="relative">
                                                                            <textarea 
                                                                                rows="3"
                                                                                className={`bg-transparent focus:bg-neutral-950 border border-transparent focus:border-neutral-800 p-1.5 w-full rounded outline-none text-[11px] font-mono leading-normal text-neutral-300 resize-none ${isFlagged ? 'border border-red-500 focus:border-red-500' : ''}`}
                                                                                value={scene.prompt}
                                                                                onChange={(e) => handleCellEdit(i, 'prompt', e.target.value)}
                                                                            />
                                                                            {isFlagged && (
                                                                                <div className="absolute right-2 bottom-2 bg-red-600 text-white font-bold text-[9px] px-1.5 py-0.5 rounded flex items-center gap-1 animate-pulse">
                                                                                    ⚠️ Pronoun Leak: {scene.qcErrors.join(', ')}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    </td>
                                                                    <td className="py-3.5 px-4 text-amber-500 font-bold font-mono text-xs">
                                                                        <input 
                                                                            type="text" 
                                                                            className="bg-transparent focus:bg-neutral-950 border border-transparent focus:border-neutral-800 p-1 w-full rounded outline-none"
                                                                            value={scene.textOverlay || ''}
                                                                            placeholder="--"
                                                                            onChange={(e) => handleCellEdit(i, 'textOverlay', e.target.value)}
                                                                        />
                                                                    </td>
                                                                    <td className="py-3.5 px-4">
                                                                        <div 
                                                                            className="cursor-pointer hover:opacity-80 transition"
                                                                            onClick={() => setActivePreviewPrompt(scene.prompt)}
                                                                        >
                                                                            <DoodlePreview prompt={scene.prompt} />
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="bg-neutral-900 border border-neutral-800 rounded-3xl p-16 text-center text-neutral-600">
                                            <span className="text-5xl block mb-4">📋</span>
                                            <h3 className="text-lg font-bold text-neutral-400 mb-2">Sandbox Empty</h3>
                                            <p className="text-sm max-w-md mx-auto">No script has been generated yet. Go to the Terminal or select a topic to compile a script production sheet.</p>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* CHARACTER REGISTRY TAB */}
                            {activeTab === 'characters' && (
                                <div className="space-y-6 max-w-4xl">
                                    <div className="bg-neutral-900 border border-neutral-800 p-6 rounded-3xl shadow-lg">
                                        <h2 className="text-xl font-bold text-white mb-1">Character Visual Preset Registry</h2>
                                        <p className="text-sm text-neutral-400 mb-6">Manage global character visual DNA cards. These definitions are injected into visual prompt templates and stateless QC correction routines.</p>
                                        
                                        <div className="space-y-4">
                                            {characters.map((char, index) => (
                                                <div key={char.name} className="bg-neutral-950 border border-neutral-850 p-5 rounded-2xl space-y-3">
                                                    <div className="flex justify-between items-center">
                                                        <span className="font-extrabold text-sm text-blue-400 font-mono">Preset ID: {char.name}</span>
                                                        <span className="text-[10px] text-neutral-500 font-mono">Art Anchor Linked</span>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] text-neutral-500 uppercase tracking-widest font-mono block mb-1">Visual Prompt DNA Injector String</label>
                                                        <textarea 
                                                            rows="2"
                                                            className="w-full bg-neutral-900 border border-neutral-800 focus:border-blue-500 p-3 rounded-xl text-xs text-neutral-200 outline-none resize-none font-mono"
                                                            value={char.description}
                                                            onChange={(e) => {
                                                                const updated = [...characters];
                                                                updated[index].description = e.target.value;
                                                                setCharacters(updated);
                                                                saveConfigToServer({ characters: updated });
                                                            }}
                                                        />
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            <button 
                                                onClick={() => {
                                                    const name = prompt("Enter new Character name (e.g. SARA):")?.toUpperCase();
                                                    if (name) {
                                                        const updated = [...characters, { name, description: 'Hand-drawn stickman outline details here...' }];
                                                        setCharacters(updated);
                                                        saveConfigToServer({ characters: updated });
                                                    }
                                                }}
                                                className="w-full bg-neutral-900 hover:bg-neutral-850 text-neutral-350 font-bold p-4 border border-dashed border-neutral-800 rounded-2xl transition text-xs flex justify-center items-center gap-2"
                                            >
                                                ➕ Register New Character Card
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* SETTINGS TAB */}
                            {activeTab === 'settings' && (
                                <div className="space-y-6 max-w-3xl">
                                    <div className="bg-neutral-900 border border-neutral-800 p-6 rounded-3xl shadow-lg space-y-6">
                                        <h2 className="text-xl font-bold text-white mb-1">Global Pipeline Configuration</h2>
                                        
                                        <div className="space-y-4">
                                            <div>
                                                <label className="text-xs font-mono text-neutral-400 block mb-1.5 font-semibold">OpenRouter API Key (Kept Private)</label>
                                                <input 
                                                    type="password" 
                                                    placeholder="sk-or-v1-..."
                                                    className="w-full bg-neutral-950 border border-neutral-850 focus:border-blue-500 p-3.5 rounded-xl text-neutral-200 outline-none font-mono text-sm"
                                                    value={apiKey}
                                                    onChange={(e) => {
                                                        setApiKey(e.target.value);
                                                        saveConfigToServer({ apiKey: e.target.value });
                                                    }}
                                                />
                                                <p className="text-[10px] text-neutral-500 font-mono mt-1">Saves to local configuration files and local-storage variables.</p>
                                            </div>

                                            <div>
                                                <label className="text-xs font-mono text-neutral-400 block mb-1.5 font-semibold">Pipeline Orchestrator Model</label>
                                                <div className="flex gap-2">
                                                    <select 
                                                        className="flex-1 bg-neutral-950 border border-neutral-850 focus:border-blue-500 p-3.5 rounded-xl text-neutral-200 outline-none font-mono text-sm"
                                                        value={model}
                                                        onChange={(e) => {
                                                            setModel(e.target.value);
                                                            saveConfigToServer({ model: e.target.value });
                                                        }}
                                                    >
                                                        <option value="deepseek/deepseek-chat">deepseek/deepseek-chat (DeepSeek V3 / V4 Flash equivalent)</option>
                                                        <option value="google/gemini-2.5-flash">google/gemini-2.5-flash</option>
                                                        <option value="google/gemini-2.5-pro">google/gemini-2.5-pro</option>
                                                        <option value="meta-llama/llama-3.1-70b-instruct">meta-llama/llama-3.1-70b-instruct</option>
                                                    </select>
                                                    <input 
                                                        type="text" 
                                                        placeholder="Custom model path..."
                                                        className="bg-neutral-950 border border-neutral-850 focus:border-blue-500 p-3.5 rounded-xl text-neutral-200 outline-none font-mono text-sm w-1/3"
                                                        value={model}
                                                        onChange={(e) => {
                                                            setModel(e.target.value);
                                                            saveConfigToServer({ model: e.target.value });
                                                        }}
                                                    />
                                                </div>
                                            </div>

                                            <div>
                                                <label className="text-xs font-mono text-neutral-400 block mb-1.5 font-semibold">Safe Output Path Directory</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="E:/doodleyt/output"
                                                    className="w-full bg-neutral-950 border border-neutral-850 focus:border-blue-500 p-3.5 rounded-xl text-neutral-200 outline-none font-mono text-sm"
                                                    value={outputPath}
                                                    onChange={(e) => {
                                                        setOutputPath(e.target.value);
                                                        saveConfigToServer({ outputPath: e.target.value });
                                                    }}
                                                />
                                            </div>
                                        </div>

                                        <div className="pt-4 border-t border-neutral-800 flex justify-end">
                                            <button 
                                                onClick={() => {
                                                    saveConfigToServer({ apiKey, model, outputPath, characters });
                                                    alert('Settings successfully locked and saved to local filesystem!');
                                                }}
                                                className="bg-blue-600 hover:bg-blue-500 text-white font-bold px-6 py-2.5 rounded-xl text-xs transition"
                                            >
                                                Save Config Properties
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* ENLARGED PREVIEW MODAL */}
                    {activePreviewPrompt && (
                        <div 
                            className="fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-50 transition-opacity"
                            onClick={() => setActivePreviewPrompt('')}
                        >
                            <div 
                                className="bg-white text-black p-8 rounded-3xl w-full max-w-xl shadow-2xl relative"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <button 
                                    onClick={() => setActivePreviewPrompt('')}
                                    className="absolute top-4 right-4 text-neutral-400 hover:text-neutral-600 text-xl font-bold font-mono"
                                >
                                    ✕
                                </button>
                                <h4 className="text-xs uppercase font-mono font-bold tracking-widest text-neutral-500 mb-4">Stateless Sketch Preview</h4>
                                <div className="border border-neutral-250 rounded-2xl p-4 bg-neutral-50 mb-6">
                                    <DoodlePreview prompt={activePreviewPrompt} />
                                </div>
                                <div className="space-y-2">
                                    <span className="text-[10px] font-bold text-neutral-400 uppercase tracking-widest font-mono block">Image Prompt String</span>
                                    <p className="text-sm text-neutral-800 leading-relaxed font-mono bg-neutral-50 p-4 rounded-xl border border-neutral-200">{activePreviewPrompt}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
